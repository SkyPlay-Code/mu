<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo-Glass Music Player</title>
    <!-- Import a modern, brutalist-friendly font (Space Grotesk) -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Brutalist variables */
            --dark: #000000;
            --light: #fafafa;
            --border-width: 3px;
            --brutal-shadow: 6px 6px 0px var(--dark);
            --brutal-shadow-sm: 4px 4px 0px var(--dark);
            --brutal-shadow-active: 0px 0px 0px var(--dark);
            
            /* Glassmorphism settings */
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-blur: blur(14px);

            /* Bright Accent Colors (showing behind glass) */
            --neon-pink: #ff2a5f;
            --neon-blue: #1bf6ff;
            --neon-yellow: #fffa1b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #dfdcd4; /* Beige retro paper tone */
            /* Brutalist dot grid pattern */
            background-image: radial-gradient(#00000022 1.5px, transparent 1.5px);
            background-size: 20px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- Ambient Blobs (Providing color for Glassmorphism) --- */
        .blob {
            position: absolute;
            border: var(--border-width) solid var(--dark);
            box-shadow: 10px 10px 0px var(--dark);
            animation: float 8s ease-in-out infinite;
            z-index: 0;
        }

        .blob-1 {
            width: 300px;
            height: 300px;
            background-color: var(--neon-pink);
            border-radius: 50%;
            top: 15%;
            left: 50%;
            margin-left: -250px;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 250px;
            height: 250px;
            background-color: var(--neon-blue);
            border-radius: 20%;
            bottom: 10%;
            right: 50%;
            margin-right: -300px;
            animation-delay: -3s;
            animation: float 10s ease-in-out infinite alternate;
        }
        
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-40px) rotate(15deg) scale(1.05); }
            100% { transform: translateY(0) rotate(-5deg); }
        }

        /* --- Main Player Container (Glassmorphism + Neobrutalism) --- */
        .player-wrapper {
            position: relative;
            z-index: 10;
            width: 95%;
            max-width: 420px;
            /* Flex layout helps sizing properly on different screens */
            display: flex;
            flex-direction: column;
            
            /* Glassmorphism Base */
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            
            /* Brutal Borders & Box-Shadow */
            border: var(--border-width) solid var(--dark);
            box-shadow: 12px 12px 0px var(--dark);
            border-radius: 16px; /* Soft brutalism approach */
            padding: 30px;
            transition: all 0.3s;
        }

        /* Spinning Artwork */
        .artwork-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px auto;
            border: var(--border-width) solid var(--dark);
            background: var(--neon-yellow);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            color: var(--dark);
            box-shadow: var(--brutal-shadow-sm);
        }

        .artwork-container.spin {
            animation: spinRecord 4s linear infinite;
        }

        @keyframes spinRecord {
            100% { transform: rotate(360deg); }
        }

        /* --- Info Display --- */
        .song-info {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }

        .song-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .artist-name {
            font-size: 0.9rem;
            color: #333;
            font-weight: 600;
            text-transform: lowercase;
            letter-spacing: 0.5px;
        }

        /* --- Feature Actions (Shuffle, Loop, List) --- */
        .action-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.5);
            border: 2px solid var(--dark);
            border-radius: 8px;
            box-shadow: 3px 3px 0px var(--dark);
            cursor: pointer;
            width: 35px;
            height: 35px;
            font-size: 0.9rem;
            display: grid;
            place-items: center;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .action-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 0px 0px 0px var(--dark);
        }

        .action-btn.active-state {
            background: var(--neon-blue);
            color: var(--dark);
        }

        /* --- Brutal Buttons --- */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
            margin-bottom: 30px;
        }

        .brutal-btn {
            border: var(--border-width) solid var(--dark);
            cursor: pointer;
            background: var(--light);
            color: var(--dark);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: var(--brutal-shadow);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        .brutal-btn:active, .brutal-btn.playing {
            box-shadow: var(--brutal-shadow-active);
            transform: translate(6px, 6px);
            background: var(--neon-pink);
        }

        .btn-small { width: 55px; height: 55px; font-size: 1.1rem; }
        .btn-large { width: 85px; height: 85px; font-size: 2rem; background: var(--neon-yellow); }

        /* --- Brutalist Sliders & Time --- */
        .sliders-container { width: 100%; margin-bottom: 10px; }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--dark);
            font-weight: 700;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: transparent;
            margin-bottom: 20px;
            cursor: pointer;
            height: 25px;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 4px;
            border: 1px solid var(--light);
        }

        /* Square Brutalist Thumb */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 22px;
            width: 22px;
            background: var(--light);
            border: 2px solid var(--dark);
            border-radius: 4px; /* Square block edge */
            margin-top: -8px; /* Alignment */
            box-shadow: 3px 3px 0px var(--dark);
            transition: all 0.1s;
        }

        input[type="range"]:active::-webkit-slider-thumb {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px var(--dark);
            background: var(--neon-pink);
        }

        /* Firefox equivalent */
        input[type="range"]::-moz-range-track {
            width: 100%; height: 8px; background: rgba(0,0,0,0.9); border-radius: 4px;
        }
        input[type="range"]::-moz-range-thumb {
            height: 22px; width: 22px; background: var(--light);
            border: 2px solid var(--dark); border-radius: 4px;
            box-shadow: 3px 3px 0px var(--dark); cursor: pointer;
        }

        /* Volume & Mute Section */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.4);
            padding: 5px 15px;
            border-radius: 30px;
            border: 2px solid var(--dark);
        }
        
        .volume-container i { cursor: pointer; transition: 0.2s; }
        .volume-container i:active { transform: scale(0.8); }
        .volume-container input[type="range"] { margin-bottom: 0; height: 16px; }

        /* --- Brutalist Playlist Drawer --- */
        .playlist {
            width: 100%;
            margin-top: 15px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 8px;
            color: var(--light);
        }

        .playlist.open {
            max-height: 200px;
            overflow-y: auto;
            border: var(--border-width) solid var(--dark);
            box-shadow: 4px 4px 0px var(--dark);
            margin-bottom: 10px;
            margin-top: 20px;
        }

        /* custom thin scrollbar for playlist */
        .playlist::-webkit-scrollbar { width: 8px; }
        .playlist::-webkit-scrollbar-thumb { background: var(--neon-pink); border-left: 2px solid black;}

        .playlist-item {
            padding: 10px 15px;
            font-size: 0.9rem;
            border-bottom: 1px solid #333;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
        }

        .playlist-item:last-child { border-bottom: none; }
        
        .playlist-item:hover { background: #333; }
        
        .playlist-item.active-track {
            background: var(--neon-yellow);
            color: var(--dark);
            font-weight: bold;
        }

        /* Mobile tweaks */
        @media screen and (max-height: 700px), (max-width: 400px) {
            .player-wrapper { padding: 20px; }
            .btn-large { width: 70px; height: 70px; font-size: 1.5rem; }
            .btn-small { width: 45px; height: 45px; }
            .artwork-container { width: 80px; height: 80px; font-size: 2rem;}
        }

    </style>
</head>
<body>

    <!-- Animated glass-blurred geometric background shapes -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="player-wrapper">
        
        <!-- Spinning CD/Artwork element -->
        <div class="artwork-container" id="artwork">
            <i class="fas fa-music"></i>
        </div>

        <!-- Song Details -->
        <div class="song-info">
            <div class="song-title" id="title">Loading track...</div>
            <div class="artist-name" id="artist">Artist Name</div>
        </div>

        <!-- Utility Row (Shuffle, Playlist, Loop) -->
        <div class="action-row">
            <button class="action-btn" id="btn-shuffle" title="Shuffle"><i class="fas fa-random"></i></button>
            <button class="action-btn" id="btn-playlist" title="Playlist"><i class="fas fa-list-ul"></i></button>
            <button class="action-btn" id="btn-loop" title="Repeat"><i class="fas fa-redo-alt"></i></button>
        </div>

        <!-- The Expanding Playlist Drawer -->
        <div class="playlist" id="playlist-drawer">
            <!-- Playlist Items auto-generated by JS -->
        </div>

        <!-- Main Controls -->
        <div class="controls">
            <button class="brutal-btn btn-small" id="prev" title="Previous">
                <i class="fas fa-backward-step"></i>
            </button>
            
            <button class="brutal-btn btn-large" id="play" title="Play / Pause">
                <i class="fas fa-play" id="play-icon"></i>
            </button>
            
            <button class="brutal-btn btn-small" id="next" title="Next">
                <i class="fas fa-forward-step"></i>
            </button>
        </div>

        <!-- Progress Bar -->
        <div class="sliders-container">
            <div class="time-display">
                <span id="curr-time">0:00</span>
                <span id="dur-time">0:00</span>
            </div>
            <input type="range" id="progress" value="0" min="0" max="100" step="0.1">
        </div>

        <!-- Volume Control -->
        <div class="volume-container">
            <i class="fas fa-volume-up" id="mute-icon" title="Toggle Mute"></i>
            <input type="range" id="volume" value="100" min="0" max="100">
        </div>

    </div>

    <script>
        // --- 1. CONFIGURATION / DATA ---
        // I have put functional dummy audio URLs here so you can test immediately. 
        // Swap these 'path' values with your "song1.mp3" file paths.
        const songs =[
            {
                name: "Worse Morning", 
                artist: "SkyMusic",
                path: "worsemorning1.mp3" 
            },
            {
                name: "Worse Morning 2",
                artist: "SkyMusic",
                path: "worsemorning2.mp3"
            },
            <!-- { -->
                <!-- name: "Neon Glass Meltdown", -->
                <!-- artist: "Electric Mirage", -->
                <!-- path: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" -->
            <!-- } -->
        ];

        // --- 2. DOM ELEMENTS ---
        const audio = new Audio();
        
        // Titles and Status
        const titleEl = document.getElementById('title');
        const artistEl = document.getElementById('artist');
        const artworkEl = document.getElementById('artwork');
        
        // Buttons
        const playBtn = document.getElementById('play');
        const playIcon = document.getElementById('play-icon');
        const prevBtn = document.getElementById('prev');
        const nextBtn = document.getElementById('next');
        const shuffleBtn = document.getElementById('btn-shuffle');
        const loopBtn = document.getElementById('btn-loop');
        const playlistToggleBtn = document.getElementById('btn-playlist');
        
        // Drawers and Arrays
        const playlistDrawer = document.getElementById('playlist-drawer');
        const progressEl = document.getElementById('progress');
        const volumeEl = document.getElementById('volume');
        const muteIcon = document.getElementById('mute-icon');
        
        // Timing
        const currTimeEl = document.getElementById('curr-time');
        const durTimeEl = document.getElementById('dur-time');

        // --- 3. GLOBAL STATE ---
        let songIndex = 0;
        let isPlaying = false;
        let isDragging = false; 
        let isShuffle = false;
        let isLoop = false;
        let isMuted = false;
        let prevVolume = 100; // Memory for muting toggler

        // --- 4. CORE FUNCTIONS ---

        function initPlayer() {
            // Render Playlist Items
            playlistDrawer.innerHTML = ''; // clear it
            songs.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = 'playlist-item';
                item.innerHTML = `<span>${index + 1}. ${song.name}</span> <i class="fas fa-play" style="font-size:0.7em; opacity:0.6;"></i>`;
                
                // Allow direct jumping to a specific track by clicking it in drawer
                item.addEventListener('click', () => {
                    songIndex = index;
                    loadSong(songIndex);
                    playSong();
                });
                
                playlistDrawer.appendChild(item);
            });

            loadSong(songIndex);
        }

        // Setup DOM for specific loaded track
        function loadSong(index) {
            titleEl.innerText = songs[index].name;
            artistEl.innerText = songs[index].artist;
            audio.src = songs[index].path;
            
            // Audio engine prep
            audio.load();

            // Reset Time Elements safely
            currTimeEl.innerText = "0:00";
            progressEl.value = 0;
            
            updatePlaylistUI();
        }

        // Highlight actively playing track in playlist
        function updatePlaylistUI() {
            const items = document.querySelectorAll('.playlist-item');
            items.forEach((item, idx) => {
                if(idx === songIndex) {
                    item.classList.add('active-track');
                } else {
                    item.classList.remove('active-track');
                }
            });
        }

        // Formatting 102 seconds into "1:42" string format
        function formatTime(sec) {
            let mins = Math.floor(sec / 60);
            let secs = Math.floor(sec % 60);
            if (secs < 10) secs = `0${secs}`;
            return `${mins}:${secs}`;
        }

        // --- 5. INTERACTION LOGIC ---
        function togglePlay() {
            isPlaying ? pauseSong() : playSong();
        }

        function playSong() {
            isPlaying = true;
            playIcon.className = 'fas fa-pause';
            playBtn.classList.add('playing');
            artworkEl.classList.add('spin');
            
            // Note: Modern browsers block autoplay until manual DOM interaction is done.
            let playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Audio waiting on interaction or source file missing.", error);
                    // UI reverts nicely if blocked:
                    pauseSong(); 
                });
            }
        }

        function pauseSong() {
            isPlaying = false;
            playIcon.className = 'fas fa-play';
            playBtn.classList.remove('playing');
            artworkEl.classList.remove('spin');
            audio.pause();
        }

        function nextSong() {
            if(isShuffle) {
                // simple pick a random song that isn't currently playing
                let randomIdx = Math.floor(Math.random() * songs.length);
                while(randomIdx === songIndex && songs.length > 1) {
                    randomIdx = Math.floor(Math.random() * songs.length);
                }
                songIndex = randomIdx;
            } else {
                songIndex++;
                if (songIndex > songs.length - 1) songIndex = 0;
            }
            loadSong(songIndex);
            if (isPlaying) playSong();
        }

        function prevSong() {
            songIndex--;
            if (songIndex < 0) songIndex = songs.length - 1;
            loadSong(songIndex);
            if (isPlaying) playSong();
        }

        function handleAutoAdvance() {
            if (isLoop) {
                // Loops the same track from beginning
                audio.currentTime = 0;
                playSong();
            } else {
                nextSong();
            }
        }

        // Drag handlers mapping logic
        function updateProgress(e) {
            if (isDragging) return; 

            const { duration, currentTime } = audio;
            if (isNaN(duration)) return;

            // Continually match slider location
            progressEl.value = (currentTime / duration) * 100;

            // Continually push text numbers
            currTimeEl.innerText = formatTime(currentTime);
            durTimeEl.innerText = formatTime(duration);
        }

        function setProgress(e) {
            const val = this.value; // Value exactly 0-100
            const duration = audio.duration;
            if(!isNaN(duration)) {
                audio.currentTime = (val / 100) * duration;
                // Also immediately snap time visually:
                currTimeEl.innerText = formatTime(audio.currentTime); 
            }
        }

        function toggleMute() {
            if(audio.volume > 0 && !isMuted) {
                // Action: Proceed Muting
                isMuted = true;
                prevVolume = volumeEl.value; // Save current point on line
                volumeEl.value = 0;
                audio.volume = 0;
                muteIcon.className = 'fas fa-volume-mute';
                muteIcon.style.color = 'var(--neon-pink)';
            } else {
                // Action: Restore Voice
                isMuted = false;
                volumeEl.value = prevVolume === "0" ? 100 : prevVolume; // Default if broke 
                audio.volume = volumeEl.value / 100;
                muteIcon.className = 'fas fa-volume-up';
                muteIcon.style.color = 'var(--dark)';
            }
        }

        function handleVolumeSet(e) {
            const setVol = e.target.value / 100;
            audio.volume = setVol;
            if(setVol === 0) {
                muteIcon.className = 'fas fa-volume-mute';
                muteIcon.style.color = 'var(--neon-pink)';
                isMuted = true;
            } else {
                muteIcon.className = 'fas fa-volume-up';
                muteIcon.style.color = 'var(--dark)';
                isMuted = false;
                prevVolume = e.target.value;
            }
        }

        // Keyboard Actions Wrapper
        function keyboardControls(e) {
            // Prevent interference with typical inputs 
            if(e.target.tagName.toLowerCase() === "input" && e.code === "Space") { e.preventDefault(); }
            
            switch(e.code) {
                case 'Space': 
                    e.preventDefault(); 
                    togglePlay(); 
                    break;
                case 'ArrowRight':
                    nextSong(); 
                    break;
                case 'ArrowLeft': 
                    prevSong(); 
                    break;
            }
        }

        // --- 6. ATTACH LISTENERS ---

        // Basic Transports
        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', nextSong);
        prevBtn.addEventListener('click', prevSong);
        document.addEventListener('keydown', keyboardControls);

        // Functional Row Elements
        shuffleBtn.addEventListener('click', () => {
            isShuffle = !isShuffle;
            shuffleBtn.classList.toggle('active-state', isShuffle);
        });

        loopBtn.addEventListener('click', () => {
            isLoop = !isLoop;
            loopBtn.classList.toggle('active-state', isLoop);
        });

        playlistToggleBtn.addEventListener('click', () => {
            playlistDrawer.classList.toggle('open');
            playlistToggleBtn.classList.toggle('active-state');
        });

        muteIcon.addEventListener('click', toggleMute);

        // Core HTML Audio hooks
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('ended', handleAutoAdvance); 
        audio.addEventListener('loadedmetadata', () => {
             // Establish ceiling timing properly 
             if(!isNaN(audio.duration)) durTimeEl.innerText = formatTime(audio.duration);
        });

        // HTML Sliders Binding
        progressEl.addEventListener('input', () => isDragging = true); 
        progressEl.addEventListener('change', function(e) { 
            isDragging = false;
            setProgress.call(this, e);
        });
        volumeEl.addEventListener('input', handleVolumeSet);

        // Kick Off Run Logic
        initPlayer();

    </script>
</body>
</html>
